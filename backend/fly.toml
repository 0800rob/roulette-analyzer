# Fly.io configuration for the roulette-analyzer backend.
# Docs: https://fly.io/docs/reference/configuration/

app = "roulette-analyzer"
primary_region = "gru"          # São Paulo
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  # Use our hand-written Dockerfile, not Fly's auto-detected one.
  dockerfile = "Dockerfile"

[env]
  # Internal port the FastAPI server listens on inside the container.
  # Must match what the Dockerfile CMD uses.
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
